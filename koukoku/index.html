<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <meta name="googlebot" content="noindex,nofollow,noarchive">
  <title>公告 - BSCI東京株式会社</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
      background: #f5f5f5;
      color: #222;
      line-height: 1.8;
      font-size: 16px;
    }
    header {
      background: #1a1a2e;
      color: #fff;
      padding: 20px 24px;
    }
    header h1 {
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: 0.05em;
    }
    main {
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px 60px;
    }
    .page-title {
      font-size: 1.5rem;
      font-weight: 700;
      border-bottom: 2px solid #1a1a2e;
      padding-bottom: 10px;
      margin-bottom: 28px;
    }
    .notice {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 24px 28px;
      margin-bottom: 32px;
    }
    .notice p {
      margin-bottom: 12px;
    }
    .notice p:last-child {
      margin-bottom: 0;
    }

    /* ===== 公告一覧テーブル ===== */
    .koukoku-list {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 32px;
    }
    .koukoku-list th,
    .koukoku-list td {
      border: 1px solid #ccc;
      padding: 10px 14px;
      text-align: left;
      vertical-align: top;
    }
    .koukoku-list th {
      background: #f0f0f5;
      font-weight: 600;
      white-space: nowrap;
    }
    .koukoku-list td a {
      color: #1a1a2e;
      text-decoration: underline;
    }
    .no-notice {
      font-size: 0.95rem;
      color: #555;
      padding: 16px 0;
    }

    /* ===== 会社情報 ===== */
    .company-info {
      background: #f9f9fb;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 20px 24px;
    }
    .company-info table {
      border-collapse: collapse;
      width: 100%;
    }
    .company-info th,
    .company-info td {
      padding: 6px 12px 6px 0;
      text-align: left;
      vertical-align: top;
    }
    .company-info th {
      white-space: nowrap;
      color: #555;
      font-weight: 400;
      width: 130px;
    }

    footer {
      text-align: center;
      font-size: 0.8rem;
      color: #888;
      padding: 24px 0;
      border-top: 1px solid #e0e0e0;
      margin-top: 40px;
    }

    @media (max-width: 600px) {
      .koukoku-list th,
      .koukoku-list td { padding: 8px 10px; font-size: 0.9rem; }
      .page-title { font-size: 1.2rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>BSCI東京株式会社</h1>
</header>

<main>
  <h2 class="page-title">電子公告</h2>

  <div class="notice">
    <p>当会社の公告は、本ページに掲載します。</p>
  </div>

  <!-- ===================================================
       公告一覧
       将来の追加方法：
         <tbody> 内に <tr> を1行追加するだけです。
         PDFがある場合は <a href="/koukoku/files/YYYY-MM-title.pdf">ダウンロード</a>
         本文のみの場合はそのままテキストを書くか別HTMLページへリンク。
       =================================================== -->
  <h3 style="font-size:1rem; margin-bottom:12px;">公告一覧</h3>
  <table class="koukoku-list">
    <thead>
      <tr>
        <th>公告日</th>
        <th>公告の種類</th>
        <th>内容・資料</th>
      </tr>
    </thead>
    <tbody>
      <!-- 公告がない間はこの行を表示 -->
      <tr>
        <td colspan="3" class="no-notice">現在、公告事項はありません。</td>
      </tr>

      <!-- 公告が生じたら以下のような行を追加（コメントアウトを外す）
      <tr>
        <td>2026年〇月〇日</td>
        <td>決算公告</td>
        <td><a href="/koukoku/files/2026-00-kessankoukoku.pdf" target="_blank" rel="noopener">貸借対照表（PDF）</a></td>
      </tr>
      <tr>
        <td>2026年〇月〇日</td>
        <td>合併公告</td>
        <td><a href="/koukoku/2026-merger.html">公告本文を読む</a></td>
      </tr>
      -->
    </tbody>
  </table>

  <!-- 会社情報 -->
  <div class="company-info">
    <table>
      <tr>
        <th>商号</th>
        <td>BSCI東京株式会社</td>
      </tr>
      <tr>
        <th>本店所在地</th>
        <td>東京都〇〇区〇〇</td>
      </tr>
      <tr>
        <th>最終更新日</th>
        <td>2026年〇月〇日</td>
      </tr>
    </table>
  </div>
</main>

<footer>
  &copy; BSCI東京株式会社
</footer>

</body>
</html>
